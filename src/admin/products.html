<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Products</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #4e4b66;
      --border: #e2e8f0;
      --accent: #c11c2a;
      --accent-hover: #d4342a;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.5 "Roboto", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .muted { color: var(--muted); font-size: 0.9em; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #f1f5f9;
    }
    .btn-primary { 
      background: var(--accent); 
      border-color: var(--accent); 
      color: #fff; 
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .btn-danger { 
      background: #fff;
      border-color: var(--danger); 
      color: var(--danger); 
    }
    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }
    .input, .textarea {
      width: 100%;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .input:focus, .textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(193, 28, 42, 0.1);
    }
    .textarea { min-height: 84px; resize: vertical; }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
    .admin-list { max-height: 65vh; overflow: auto; display: grid; gap: 8px; padding-right: 4px; }
    .admin-list::-webkit-scrollbar { width: 6px; }
    .admin-list::-webkit-scrollbar-track { background: transparent; }
    .admin-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .admin-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
      transition: all 0.2s;
    }
    .admin-item:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
    }
    .admin-item.is-active { 
      border-color: var(--accent); 
      background: rgba(193, 28, 42, 0.03);
    }
    .admin-item__title { font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .admin-item__meta { font-size: 13px; color: var(--muted); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-grid label { display: flex; flex-direction: column; gap: 6px; font-weight: 500; }
    .err {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #fca5a5;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 8px;
      white-space: pre-wrap;
      font-size: 14px;
    }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div data-admin-root class="wrap">
    <section data-admin-login class="card" style="max-width: 400px; margin: 40px auto; text-align: center;" hidden>
      <h1 style="margin-top:0">Admin Login</h1>
      <p class="muted">Sign in to edit the product catalog.</p>
      <form data-login-form style="margin-top:20px; display: flex; flex-direction: column; gap: 12px;">
        <input class="input" type="password" name="password" placeholder="Password" required style="text-align: center;">
        <button class="btn btn-primary" type="submit" style="width: 100%;">Login</button>
      </form>
      <div data-login-error class="err"></div>
    </section>

    <section data-admin-app hidden>
      <div class="card" style="margin-bottom:16px">
        <div class="row" style="justify-content:space-between">
          <div class="row">
            <h1 style="margin:0; font-size: 24px; color: var(--text);">Products</h1>
            <span data-admin-status class="muted">Idle</span>
          </div>
          <div class="row">
            <button class="btn" type="button" data-admin-refresh>Refresh</button>
            <button class="btn" type="button" data-admin-export>Export</button>
            <button class="btn" type="button" data-admin-import>Import</button>
            <input data-admin-import-file type="file" accept="application/json" hidden>
            <button class="btn" type="button" data-admin-logout>Logout</button>
          </div>
        </div>
      </div>

      <div class="grid">
        <aside class="card">
          <div class="row" style="margin-bottom:12px; flex-wrap: nowrap;">
            <input class="input" style="flex: 1;" type="search" placeholder="Search products…" data-admin-search>
            <button class="btn btn-primary" type="button" data-admin-add>Add New</button>
          </div>
          <div class="admin-list" data-admin-list></div>
        </aside>

        <section class="card">
          <p class="muted" data-admin-empty>Select a product to edit.</p>

          <form data-admin-form hidden>
            <div class="form-grid">
              <label>
                <span class="muted">ID</span>
                <input class="input" data-f="id" type="text">
              </label>
              <label>
                <span class="muted">Slug</span>
                <input class="input" data-f="slug" type="text">
              </label>
              <label class="full">
                <span class="muted">Title</span>
                <input class="input" data-f="title" type="text">
              </label>
              <label class="full">
                <span class="muted">Subtitle</span>
                <input class="input" data-f="subtitle" type="text">
              </label>
              <label>
                <span class="muted">Price</span>
                <input class="input" data-f="price" type="text">
              </label>
              <label>
                <span class="muted">Compare At</span>
                <input class="input" data-f="compareAt" type="text">
              </label>
              <label>
                <span class="muted">Badge</span>
                <input class="input" data-f="badge" type="text">
              </label>
              <label>
                <span class="muted">Badges (CSV)</span>
                <input class="input" data-f="badges" type="text">
              </label>
              <label class="full">
                <span class="muted">Collections (CSV)</span>
                <input class="input" data-f="collections" type="text">
              </label>
              <label class="full">
                <span class="muted">Tags (CSV)</span>
                <input class="input" data-f="tags" type="text">
              </label>
              <label class="full">
                <span class="muted">Image URL</span>
                <div style="display: flex; gap: 12px; align-items: flex-start;">
                  <img data-admin-image-preview src="" alt="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: none;">
                  <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                    <input class="input" data-f="image" type="text">
                    <div class="row">
                      <button class="btn" type="button" data-admin-upload>Upload Image</button>
                      <input data-admin-upload-file type="file" accept="image/*" hidden>
                      <span data-admin-upload-status class="muted"></span>
                    </div>
                  </div>
                </div>
              </label>
            </div>

            <div class="row" style="margin-top:24px; padding-top:16px; border-top: 1px solid var(--border);">
              <button class="btn btn-primary" type="submit" data-admin-save>Save Product</button>
              <button class="btn btn-danger" type="button" data-admin-delete>Delete</button>
            </div>
            <div data-admin-error class="err"></div>
          </form>
        </section>
      </div>
    </section>
  </div>

  <script>
    (function loadAdminScript() {
      var candidates = ['/assets/js/admin.js', '/src/assets/js/admin.js'];
      var idx = 0;
      function tryNext() {
        if (idx >= candidates.length) {
          console.error('Failed to load admin.js from known paths.');
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[idx++];
        s.defer = true;
        s.onerror = tryNext;
        document.body.appendChild(s);
      }
      tryNext();
    })();
  </script>
</body>
</html>
