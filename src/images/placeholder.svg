<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#f2ece0"/>
  <rect x="18" y="18" width="464" height="464" fill="none" stroke="#c11c2a" stroke-width="1" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- Starburst — 16 rays, alternating long/short, from center 250,250 -->
  <!-- Long rays: r=90 -->
  <line x1="250" y1="250" x2="250" y2="160" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="314" y2="186" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="340" y2="250" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="314" y2="314" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="250" y2="340" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="186" y2="314" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="160" y2="250" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="186" y2="186" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <!-- Short rays: r=55, at 22.5° offset -->
  <line x1="250" y1="250" x2="271" y2="195" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="305" y2="229" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="305" y2="271" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="271" y2="305" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="229" y2="305" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="195" y2="271" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="195" y2="229" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <line x1="250" y1="250" x2="229" y2="195" stroke="#c11c2a" stroke-width="1.2" opacity="0.7"/>
  <!-- Center circle -->
  <circle cx="250" cy="250" r="5" fill="#c11c2a" opacity="0.7"/>
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="100" fill="none" stroke="#c11c2a" stroke-width="0.8" opacity="0.3"/>
</svg>
